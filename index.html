<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart POS — Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap');
    * { font-family: 'DM Sans', system-ui, sans-serif; }

    @keyframes fade-in  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse-g  { 0%,100%{opacity:1} 50%{opacity:.55} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes flash-in { 0%{background:rgba(20,184,166,.18)} 100%{background:transparent} }

    .fade-in   { animation:fade-in .35s ease-out both }
    .fade-in-1 { animation-delay:.05s } .fade-in-2 { animation-delay:.10s }
    .fade-in-3 { animation-delay:.15s } .fade-in-4 { animation-delay:.20s }
    .pulse-glow{ animation:pulse-g 2.5s ease-in-out infinite }
    .spin      { animation:spin .7s linear infinite }
    .new-row   { animation:flash-in 1.8s ease-out }

    ::-webkit-scrollbar       { width:6px }
    ::-webkit-scrollbar-track { background:transparent }
    ::-webkit-scrollbar-thumb { background:#334155;border-radius:3px }
    .chart-bar { transition:height .6s cubic-bezier(.22,1,.36,1) }

    /* Live dot */
    .live-dot::before {
      content:'';display:inline-block;width:7px;height:7px;
      border-radius:50%;background:#34d399;margin-right:6px;
      animation:pulse-g 1.8s ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen transition-colors duration-300" id="body">

<!-- ════════════════════════════════════════════════════════
     LOGIN SCREEN
     ════════════════════════════════════════════════════════ -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div id="login-card" class="w-full max-w-sm rounded-2xl p-8 shadow-2xl border">
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-xl mb-4
                  bg-gradient-to-br from-teal-500 to-cyan-600 shadow-lg shadow-teal-500/25">P</div>
      <h1 id="login-title" class="text-xl font-bold">Smart POS</h1>
      <p id="login-sub" class="text-sm mt-1">Admin Dashboard Login</p>
    </div>
    <div id="login-error" class="hidden bg-red-500/10 border border-red-500/20 text-red-400
                                  text-xs rounded-lg px-4 py-2.5 mb-4"></div>
    <div class="flex flex-col gap-4">
      <div>
        <label id="lbl-user" class="text-xs font-semibold uppercase tracking-wider mb-1.5 block">Username</label>
        <input id="inp-user" value="admin"
               class="w-full rounded-lg px-4 py-2.5 text-sm outline-none border transition-colors" />
      </div>
      <div>
        <label id="lbl-pass" class="text-xs font-semibold uppercase tracking-wider mb-1.5 block">Password</label>
        <input id="inp-pass" type="password" value="admin123"
               class="w-full rounded-lg px-4 py-2.5 text-sm outline-none border transition-colors"
               onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button onclick="doLogin()"
              class="w-full bg-gradient-to-r from-teal-500 to-cyan-600 text-white font-semibold
                     text-sm rounded-lg px-4 py-2.5 mt-2 hover:opacity-90 transition-opacity
                     shadow-lg shadow-teal-500/20">
        Sign In
      </button>
      <p id="login-hint" class="text-xs text-center mt-2">Default: admin / admin123</p>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     DASHBOARD  (hidden until logged in)
     ════════════════════════════════════════════════════════ -->
<div id="dashboard" class="hidden">

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-screen w-60 flex flex-col border-r z-30 transition-all duration-300">
    <div id="sidebar-header" class="flex items-center gap-3 px-4 h-16 border-b shrink-0">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center
                  justify-center text-white font-black text-sm shrink-0 shadow-lg shadow-teal-500/20">P</div>
      <span id="sidebar-brand" class="font-bold text-sm tracking-tight">Smart POS</span>
    </div>

    <nav id="sidebar-nav" class="flex-1 py-3 px-2 overflow-y-auto"></nav>

    <div id="sidebar-bottom" class="border-t px-2 py-3 flex flex-col gap-1 shrink-0">
      <!-- Live indicator -->
      <div id="live-indicator" class="flex items-center px-3 py-2 text-xs">
        <span class="live-dot font-medium"></span>
        <span id="last-refresh-label">Live</span>
      </div>
      <button onclick="toggleDark()" id="btn-theme"
              class="w-full flex items-center gap-3 rounded-xl px-3 py-2 text-sm transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <path id="theme-icon-path" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <span id="theme-label">Light mode</span>
      </button>
      <button onclick="doLogout()"
              class="w-full flex items-center gap-3 rounded-xl px-3 py-2 text-sm transition-colors hover:text-red-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div id="main-wrapper" class="ml-60 transition-all duration-300">
    <header id="topbar"
            class="sticky top-0 z-20 border-b backdrop-blur-xl h-16 flex items-center justify-between px-6">
      <h2 id="page-title" class="text-lg font-bold tracking-tight">Dashboard Overview</h2>
      <div class="flex items-center gap-3">
        <button onclick="loadAllData()" id="btn-refresh"
                class="text-xs px-3 py-1.5 rounded-lg border transition-colors flex items-center gap-1.5"
                title="Refresh now">
          <svg id="refresh-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0
                     0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Refresh
        </button>
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold
                    bg-gradient-to-br from-teal-500 to-cyan-600 text-white">A</div>
      </div>
    </header>
    <main id="content" class="p-6"></main>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════
   CONSTANTS & STATE
   ════════════════════════════════════════════════════════════════════ */
const API = "http://localhost:8000/api";

let TOKEN      = null;
let DARK       = true;
let PAGE       = "overview";
let DATA       = {};          // cached responses keyed by page name
let REFRESH_IV = null;
let LAST_TXN_COUNT = 0;       // used to detect new cashier submissions

// How often the dashboard auto-refreshes (ms).
// 10 s keeps cashier activity visible almost immediately.
const REFRESH_MS = 10_000;

/* ── Formatters ─────────────────────────────────────────────────── */
const usd      = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",
                       minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const usd2     = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n);
const pct      = n => (n>0?"+":"") + n.toFixed(1) + "%";
const shortDate= iso => new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const shortTime= iso => new Date(iso).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});

/* ── Nav items ──────────────────────────────────────────────────── */
const NAV_ITEMS = [
  { id:"overview",  label:"Overview",          icon:"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" },
  { id:"branches",  label:"Branches",          icon:"M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5" },
  { id:"txns",      label:"Transactions",      icon:"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" },
  { id:"fraud",     label:"Fraud Detection",   icon:"M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" },
  { id:"alerts",    label:"Alerts",            icon:"M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" },
  { id:"charts",    label:"Analytics",         icon:"M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" },
  { id:"products",  label:"Cashier Products",  icon:"M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" },
];

const PAGE_TITLES = {
  overview:"Dashboard Overview", branches:"Branch Monitoring",
  txns:"Transaction History",    fraud:"Fraud Detection",
  alerts:"Alert Center",         charts:"Analytics",
  products:"Cashier Products",
};


/* ════════════════════════════════════════════════════════════════════
   API HELPER
   All authenticated requests go through here.
   On 401 the user is automatically logged out.
   ════════════════════════════════════════════════════════════════════ */
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      ...(TOKEN ? { Authorization: `Bearer ${TOKEN}` } : {}),
      ...opts.headers,
    },
  });
  if (res.status === 401) { doLogout(); throw new Error("UNAUTHORIZED"); }
  if (!res.ok) throw new Error("API " + res.status);
  return res.json();
}


/* ════════════════════════════════════════════════════════════════════
   THEME
   ════════════════════════════════════════════════════════════════════ */
function applyTheme() {
  const b = document.getElementById("body");
  b.className = DARK
    ? "min-h-screen bg-[#0a0e17] text-slate-100 transition-colors duration-300"
    : "min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300";

  // Login
  const lc = document.getElementById("login-card");
  if (lc) lc.className = `w-full max-w-sm rounded-2xl p-8 shadow-2xl border
    ${DARK?"bg-[#111827] border-white/5":"bg-white border-slate-200"}`;
  setTxt("login-title", `text-xl font-bold ${DARK?"text-white":"text-slate-900"}`);
  setTxt("login-sub",   `text-sm mt-1 ${DARK?"text-slate-500":"text-slate-400"}`);
  setTxt("login-hint",  `text-xs text-center mt-2 ${DARK?"text-slate-600":"text-slate-400"}`);
  document.querySelectorAll("#login-screen label").forEach(l =>
    l.className=`text-xs font-semibold uppercase tracking-wider mb-1.5 block
    ${DARK?"text-slate-400":"text-slate-500"}`);
  document.querySelectorAll("#login-screen input").forEach(i =>
    i.className=`w-full rounded-lg px-4 py-2.5 text-sm outline-none border transition-colors
    ${DARK?"bg-white/5 border-white/10 text-white focus:border-teal-500":"bg-slate-50 border-slate-200 text-slate-900 focus:border-teal-500"}`);

  // Sidebar
  const sb = document.getElementById("sidebar");
  if (sb) sb.className=`fixed top-0 left-0 h-screen w-60 flex flex-col border-r z-30
    transition-all duration-300 ${DARK?"bg-[#0d1117] border-white/5":"bg-white border-slate-200"}`;
  const sh = document.getElementById("sidebar-header");
  if (sh) sh.className=`flex items-center gap-3 px-4 h-16 border-b shrink-0
    ${DARK?"border-white/5":"border-slate-100"}`;
  const sbn = document.getElementById("sidebar-brand");
  if (sbn) sbn.className=`font-bold text-sm tracking-tight ${DARK?"text-white":"text-slate-900"}`;
  const sbb = document.getElementById("sidebar-bottom");
  if (sbb) sbb.className=`border-t px-2 py-3 flex flex-col gap-1 shrink-0
    ${DARK?"border-white/5":"border-slate-100"}`;
  const li = document.getElementById("live-indicator");
  if (li) li.className=`flex items-center px-3 py-2 text-xs
    ${DARK?"text-emerald-500":"text-emerald-600"}`;
  document.querySelectorAll("#sidebar-bottom button").forEach(btn =>
    btn.className=`w-full flex items-center gap-3 rounded-xl px-3 py-2 text-sm transition-colors
    ${DARK?"text-slate-500 hover:text-slate-300 hover:bg-white/5":"text-slate-400 hover:text-slate-600 hover:bg-slate-50"}`);
  setTxt("theme-label", DARK?"Light mode":"Dark mode");
  document.getElementById("theme-icon-path")?.setAttribute("d",
    DARK ? "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
         : "M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z");

  // Topbar
  const tb = document.getElementById("topbar");
  if (tb) tb.className=`sticky top-0 z-20 border-b backdrop-blur-xl h-16 flex items-center
    justify-between px-6 ${DARK?"bg-[#0a0e17]/80 border-white/5":"bg-slate-100/80 border-slate-200"}`;
  const br = document.getElementById("btn-refresh");
  if (br) br.className=`text-xs px-3 py-1.5 rounded-lg border transition-colors flex items-center gap-1.5
    ${DARK?"border-white/10 text-slate-400 hover:bg-white/5":"border-slate-200 text-slate-500 hover:bg-slate-200"}`;

  renderNav();
  renderPage();
}

function setTxt(id, cls) {
  const el = document.getElementById(id);
  if (el) el.className = cls;
}

function toggleDark() { DARK = !DARK; applyTheme(); }


/* ════════════════════════════════════════════════════════════════════
   AUTH
   ════════════════════════════════════════════════════════════════════ */
async function doLogin() {
  const errEl = document.getElementById("login-error");
  errEl.classList.add("hidden");
  try {
    const data = await apiFetch("/auth/login", {
      method: "POST",
      body: JSON.stringify({
        username: document.getElementById("inp-user").value,
        password: document.getElementById("inp-pass").value,
      }),
    });
    TOKEN = data.token;
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    applyTheme();
    await loadAllData();
    // Auto-refresh every REFRESH_MS so cashier submissions appear quickly
    REFRESH_IV = setInterval(loadAllData, REFRESH_MS);
    startRefreshClock();
  } catch (e) {
    errEl.textContent = "Invalid credentials or server unreachable";
    errEl.classList.remove("hidden");
  }
}

function doLogout() {
  TOKEN = null; DATA = {};
  clearInterval(REFRESH_IV);
  clearInterval(CLOCK_IV);
  document.getElementById("login-screen").classList.remove("hidden");
  document.getElementById("dashboard").classList.add("hidden");
  applyTheme();
}


/* ════════════════════════════════════════════════════════════════════
   LIVE CLOCK  — "Updated Xs ago" shown in sidebar
   ════════════════════════════════════════════════════════════════════ */
let LAST_REFRESH_MS = Date.now();
let CLOCK_IV = null;

function startRefreshClock() {
  clearInterval(CLOCK_IV);
  CLOCK_IV = setInterval(() => {
    const sec = Math.round((Date.now() - LAST_REFRESH_MS) / 1000);
    const lbl = document.getElementById("last-refresh-label");
    if (lbl) lbl.textContent = sec < 5 ? "Live" : `Updated ${sec}s ago`;
  }, 1000);
}


/* ════════════════════════════════════════════════════════════════════
   DATA LOADING
   All pages share a single refresh cycle.
   The Transactions page always gets fresh data so new cashier rows
   appear with the green flash animation.
   ════════════════════════════════════════════════════════════════════ */
async function loadAllData() {
  animateRefreshIcon(true);
  try {
    const [sales, fraud, branches, lineChart, barChart] = await Promise.all([
      apiFetch("/sales"),
      apiFetch("/fraud"),
      apiFetch("/branches"),
      apiFetch("/charts/sales-over-time"),
      apiFetch("/charts/branch-breakdown"),
    ]);
    DATA = { ...DATA, sales, fraud, branches, lineChart, barChart };
    LAST_REFRESH_MS = Date.now();

    // Reload transactions if we're on that page (to show new cashier rows)
    if (PAGE === "txns") {
      await loadTransactions(TXN_PAGE);
    } else {
      renderPage();
    }
  } catch (e) {
    console.error("Data load failed:", e);
  } finally {
    animateRefreshIcon(false);
  }
}

let TXN_PAGE = 1;
async function loadTransactions(p = 1) {
  TXN_PAGE = p;
  try {
    const prev = DATA.txns?.total ?? 0;
    DATA.txns = await apiFetch(`/transactions?page=${TXN_PAGE}&per_page=20`);
    // Track if new transactions arrived (for flash animation)
    DATA.txns._newCount = DATA.txns.total - prev;
    renderPage();
  } catch (e) { console.error(e); }
}

async function loadProducts() {
  try {
    DATA.products = await apiFetch("/products");
    renderPage();
  } catch (e) { console.error(e); }
}

function animateRefreshIcon(on) {
  const icon = document.getElementById("refresh-icon");
  if (icon) icon.className = on ? "w-3.5 h-3.5 spin" : "w-3.5 h-3.5";
}


/* ════════════════════════════════════════════════════════════════════
   NAVIGATION
   ════════════════════════════════════════════════════════════════════ */
function renderNav() {
  const nav = document.getElementById("sidebar-nav");
  if (!nav) return;
  const fraudBadge = DATA.sales?.total_flagged > 0
    ? `<span class="ml-auto text-[10px] font-bold bg-red-500/20 text-red-400 rounded-full px-2 py-0.5">
        ${DATA.sales.total_flagged}</span>` : "";

  nav.innerHTML = NAV_ITEMS.map(n => {
    const active = n.id === PAGE;
    const cls = active
      ? DARK ? "bg-teal-500/10 text-teal-400" : "bg-teal-50 text-teal-700"
      : DARK ? "text-slate-400 hover:text-slate-200 hover:bg-white/5"
             : "text-slate-500 hover:text-slate-800 hover:bg-slate-50";
    const badge = n.id === "fraud" ? fraudBadge : "";
    return `<button onclick="navigate('${n.id}')"
              class="w-full flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm
                     font-medium transition-all mb-0.5 ${cls}">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor"
           stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="${n.icon}"/>
      </svg>
      <span class="truncate">${n.label}</span>${badge}
    </button>`;
  }).join("");
}

function navigate(id) {
  PAGE = id;
  document.getElementById("page-title").textContent = PAGE_TITLES[id];
  renderNav();
  if (id === "txns")     loadTransactions(1);
  else if (id === "products") loadProducts();
  else renderPage();
}


/* ════════════════════════════════════════════════════════════════════
   RENDER ROUTER
   ════════════════════════════════════════════════════════════════════ */
function renderPage() {
  const el = document.getElementById("content");
  if (!el) return;
  const renderers = {
    overview: renderOverview,
    branches: renderBranches,
    txns:     renderTxns,
    fraud:    renderFraud,
    alerts:   renderAlerts,
    charts:   renderCharts,
    products: renderProducts,
  };
  el.innerHTML = (renderers[PAGE] ?? (() => ""))();
}


/* ════════════════════════════════════════════════════════════════════
   SHARED UI HELPERS
   ════════════════════════════════════════════════════════════════════ */
function card(cls2 = "", inner = "") {
  return `<div class="rounded-2xl border p-5 ${DARK
    ? "bg-[#111827] border-white/5"
    : "bg-white border-slate-200 shadow-sm"} ${cls2}">${inner}</div>`;
}

function loader() {
  return `<div class="flex items-center justify-center py-24">
    <div class="w-7 h-7 border-2 rounded-full spin
      ${DARK?"border-slate-700 border-t-teal-400":"border-slate-200 border-t-teal-500"}"></div>
  </div>`;
}

function statCard(label, value, change, color, delay) {
  const c = color || "teal";
  const bg   = DARK ? `bg-${c}-500/10` : `bg-${c}-50`;
  const txt  = `text-${c}-500`;
  const badge = change !== null
    ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full
        ${change >= 0
          ? "bg-emerald-500/10 text-emerald-500"
          : "bg-red-500/10 text-red-400"}">${pct(change)}</span>`
    : "";
  return `<div class="rounded-2xl p-5 border transition-all hover:scale-[1.02] duration-200
    fade-in fade-in-${delay} ${DARK?"bg-[#111827] border-white/5 shadow-xl":"bg-white border-slate-200 shadow-sm"}">
    <div class="flex items-start justify-between mb-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center ${bg} ${txt}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>${badge}
    </div>
    <p class="text-2xl font-extrabold tracking-tight ${DARK?"text-white":"text-slate-900"}">${value}</p>
    <p class="text-xs font-medium mt-1 ${DARK?"text-slate-500":"text-slate-400"}">${label}</p>

/* ════════════════════════════════════════════════════════════════════
   TRANSACTIONS PAGE

function renderTxns() {
  if (!DATA.txns) { loadTransactions(1); return loader(); }
  const d = DATA.txns;

  let html = `<div class="flex flex-col gap-4">`;

  // Filter buttons
  html += `<div class="flex gap-2 flex-wrap">
    ${["all","cashier","pos"].map(f => {
      const label = f === "all" ? "All" : f === "cashier" ? "🛒 Cashier Only" : "POS Only";
      const active = (TXN_TYPE_FILTER === f);
      return `<button onclick="setTxnFilter('${f}')"
        class="text-xs font-semibold px-3 py-1.5 rounded-lg border transition-colors
        ${active
          ? DARK?"bg-teal-500/15 border-teal-500/30 text-teal-400"
                :"bg-teal-50 border-teal-200 text-teal-700"
          : DARK?"border-white/10 text-slate-400 hover:bg-white/5"
                :"border-slate-200 text-slate-500 hover:bg-slate-50"}">${label}</button>`;
    }).join("")}
    <span class="ml-auto text-xs ${DARK?"text-slate-500":"text-slate-400"} self-center">
      ${d.total} transactions
    </span>
  </div>`;

  html += `<div class="rounded-2xl border overflow-hidden
    ${DARK?"bg-[#111827] border-white/5":"bg-white border-slate-200 shadow-sm"}">
    <div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="${DARK?"bg-white/[0.02]":"bg-slate-50"}">
        ${["ID","Branch","Product","Amount","Time","Method","Status"].map(h =>
          `<th class="px-4 py-3 text-[10px] font-bold uppercase tracking-wider text-left
            ${DARK?"text-slate-500":"text-slate-400"}">${h}</th>`).join("")}
      </tr></thead>
      <tbody>`;

  d.items.forEach((t, i) => {
    const m = METHOD_STYLES[t.payment_method] ?? { l: t.payment_method, c: "bg-slate-500/10 text-slate-400" };
    const isCashier   = t.type === "cashier";
    const isNew       = i < (d._newCount ?? 0);
    const suspicious  = t.suspicious;
    const rowCls = suspicious
      ? DARK ? "bg-red-500/[0.04] hover:bg-red-500/[0.07]" : "bg-red-50/50 hover:bg-red-50"
      : isCashier
      ? DARK ? "bg-teal-500/[0.03] hover:bg-teal-500/[0.06]" : "bg-teal-50/30 hover:bg-teal-50/60"
      : DARK ? "hover:bg-white/[0.02]" : "hover:bg-slate-50/50";

    html += `<tr class="border-t transition-colors ${isNew ? "new-row" : ""}
      ${DARK?"border-white/5":"border-slate-100"} ${rowCls}">
      <td class="px-4 py-3 font-mono text-xs ${DARK?"text-slate-300":"text-slate-700"}">${t.id}</td>
      <td class="px-4 py-3 text-xs ${DARK?"text-slate-400":"text-slate-500"}">${t.branch_name}</td>
      <td class="px-4 py-3 text-xs ${DARK?"text-slate-400":"text-slate-500"}">
        ${t.product_name
          ? `<span class="font-medium ${DARK?"text-slate-200":"text-slate-700"}">${t.product_name}</span>`
          : `<span class="${DARK?"text-slate-700":"text-slate-300"}">—</span>`}
      </td>
      <td class="px-4 py-3 font-mono font-bold text-xs
        ${suspicious ? "text-red-400" : isCashier ? "text-teal-400" : "text-teal-500"}">
        ${usd2(t.amount)}
      </td>
      <td class="px-4 py-3 text-xs ${DARK?"text-slate-500":"text-slate-400"}">
        ${shortDate(t.time)} ${shortTime(t.time)}
      </td>
      <td class="px-4 py-3">
        <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded-full ${m.c}">${m.l}</span>
      </td>
      <td class="px-4 py-3">
        ${suspicious
          ? `<span class="text-[10px] font-bold bg-red-500/15 text-red-400 px-2.5 py-0.5 rounded-full">Suspicious</span>`
          : `<span class="text-[10px] font-medium bg-emerald-500/10 text-emerald-500 px-2.5 py-0.5 rounded-full">Clean</span>`}
      </td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  // Pagination
  html += `<div class="flex items-center justify-between">
    <p class="text-xs ${DARK?"text-slate-500":"text-slate-400"}">
      Page ${d.page} of ${d.pages} · ${d.total} transactions
    </p>

      <button onclick="loadTransactions(${d.page-1})" ${d.page<=1?"disabled":""}
        class="px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors disabled:opacity-30
        ${DARK?"bg-white/5 border-white/10 text-slate-300 hover:bg-white/10":"bg-white border-slate-200 text-slate-600 hover:bg-slate-50"}">
        Previous
      </button>
      <button onclick="loadTransactions(${d.page+1})" ${d.page>=d.pages?"disabled":""}
        class="px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors disabled:opacity-30
        ${DARK?"bg-white/5 border-white/10 text-slate-300 hover:bg-white/10":"bg-white border-slate-200 text-slate-600 hover:bg-slate-50"}">
        Next
      </button>
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

// Track the active filter for the transactions page
let TXN_TYPE_FILTER = "all";
function setTxnFilter(f) {
  TXN_TYPE_FILTER = f;
  const path = f === "all"
    ? `/transactions?page=1&per_page=20`
    : `/transactions?page=1&per_page=20&type=${f}`;
  TXN_PAGE = 1;
  apiFetch(path).then(data => { DATA.txns = { ...data, _newCount: 0 }; renderPage(); });
}

      <td class="px-5 py-3 font-mono font-bold text-xs text-red-400">${usd2(t.amount)}</td>
      <td class="px-5 py-3 text-xs ${DARK?"text-slate-500":"text-slate-400"}">
        ${shortDate(t.time)} ${shortTime(t.time)}

      <td class="px-5 py-3">

    html += `<div class="rounded-2xl border p-12 text-center fade-in
      ${DARK?"bg-[#111827] border-white/5":"bg-white border-slate-200 shadow-sm"}">
      <p class="text-sm font-semibold ${DARK?"text-slate-400":"text-slate-500"}">
        No batches yet
      </p>
      <p class="text-xs mt-1 ${DARK?"text-slate-600":"text-slate-400"}">
        Submit products from the cashier page — they will appear here and update all other pages.
      </p>
    </div>`;
    return html + `</div>`;
  }

  html += `<div class="flex flex-col gap-4">`;
  d.batches.forEach((batch, i) => {
    html += `<div class="rounded-2xl border overflow-hidden fade-in fade-in-${Math.min(i+1,4)}
      ${DARK?"bg-[#111827] border-white/5":"bg-white border-slate-200 shadow-sm"}">
      <!-- Batch header -->
      <div class="flex flex-wrap items-center gap-3 px-5 py-4 border-b
        ${DARK?"border-white/5":"border-slate-100"}">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0
          bg-teal-500/10 text-teal-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75"
               viewBox="0 0 24 24">
            <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold font-mono ${DARK?"text-teal-400":"text-teal-600"}">
            ${batch.batch_id}
          </p>
          <p class="text-xs mt-0.5 ${DARK?"text-slate-500":"text-slate-400"}">
            ${batch.branch_name} ·
            ${new Date(batch.submitted_at).toLocaleString("en-US",
              {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
          </p>
        </div>
        <div class="text-right shrink-0">
          <p class="text-sm font-extrabold ${DARK?"text-white":"text-slate-900"}">
            ${usd2(batch.total)}
          </p>
          <p class="text-[10px] ${DARK?"text-slate-500":"text-slate-400"}">
            ${batch.count} item${batch.count!==1?"s":""}
          </p>
        </div>
      </div>
      ${batch.cashier_note
        ? `<div class="px-5 py-2 text-xs italic border-b
             ${DARK?"text-slate-500 bg-white/[0.01] border-white/5"
                   :"text-slate-400 bg-slate-50 border-slate-100"}">
             📝 ${batch.cashier_note}
           </div>` : ""}
      <!-- Products table -->
      <table class="w-full text-sm">
        <thead><tr class="${DARK?"bg-white/[0.02]":"bg-slate-50/60"}">
          <th class="px-5 py-2.5 text-[10px] font-bold uppercase tracking-wider text-left
            ${DARK?"text-slate-500":"text-slate-400"}">#</th>
          <th class="px-5 py-2.5 text-[10px] font-bold uppercase tracking-wider text-left
            ${DARK?"text-slate-500":"text-slate-400"}">Product Name</th>
          <th class="px-5 py-2.5 text-[10px] font-bold uppercase tracking-wider text-right
            ${DARK?"text-slate-500":"text-slate-400"}">Price</th>
        </tr></thead>
        <tbody>
          ${batch.products.map((p, j) => `
          <tr class="border-t ${DARK?"border-white/5 hover:bg-white/[0.02]"
                                     :"border-slate-100 hover:bg-slate-50/50"}">
            <td class="px-5 py-2.5 text-xs font-mono ${DARK?"text-slate-600":"text-slate-400"}">
              ${j+1}
            </td>
            <td class="px-5 py-2.5 text-xs font-medium ${DARK?"text-slate-200":"text-slate-700"}">
              ${p.name}
            </td>
            <td class="px-5 py-2.5 text-xs font-mono font-bold text-right text-teal-500">
              ${usd2(p.price)}
            </td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  });

  html += `</div></div>`;
  return html;
}


/* ════════════════════════════════════════════════════════════════════
   CHART RENDERERS  (SVG, no external library)
   ════════════════════════════════════════════════════════════════════ */
function lineChart(labels, values) {
  if (!labels?.length) return "";
  const max   = Math.max(...values);
  const min   = Math.min(...values);
  const range = max - min || 1;
  const W = 600, H = 180, PAD = 30;

  const pts = labels.map((l, i) => ({
    x: PAD + (i / (labels.length - 1)) * (W - PAD * 2),
    y: H - PAD - ((values[i] - min) / range) * (H - PAD * 2),
    label: l.slice(5),    // strip "2026-"
    val: values[i],
  }));

  const pathD = pts.map((p, i) => `${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const areaD = pathD + ` L${pts.at(-1).x},${H-PAD} L${pts[0].x},${H-PAD} Z`;

  return `<svg viewBox="0 0 ${W} ${H}" class="w-full" style="max-height:200px">
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#14b8a6" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#lg)"/>
    <path d="${pathD}" fill="none" stroke="#14b8a6" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#14b8a6"/>`).join("")}
    ${pts.filter((_,i) => i % 2 === 0).map(p =>
      `<text x="${p.x}" y="${H-8}" text-anchor="middle" font-size="9"
             fill="${DARK?"#475569":"#94a3b8"}">${p.label}</text>`).join("")}
  </svg>`;
}

function barChart(data, labelKey, valKey, colorClass) {
  if (!data?.length) return `<p class="text-xs text-slate-500">No data</p>`;
  const max = Math.max(...data.map(d => d[valKey])) || 1;
  return `<div class="flex items-end gap-2 h-48 mt-2">
    ${data.map(d => {
      const h = Math.max((d[valKey] / max) * 100, 2);
      const label = d[labelKey].split(" ")[0];
      return `<div class="flex-1 flex flex-col items-center gap-1">
        <span class="text-[9px] font-bold ${DARK?"text-slate-400":"text-slate-500"}">
          ${valKey==="sales" ? usd(d[valKey]) : d[valKey]}
        </span>
        <div class="w-full rounded-t-md chart-bar ${colorClass}" style="height:${h}%"></div>
        <span class="text-[9px] ${DARK?"text-slate-600":"text-slate-400"} truncate max-w-full">
          ${label}
        </span>
      </div>`;
    }).join("")}
  </div>`;
}
